name = "plushie_gleam"
version = "0.6.0"
plushie_rust_version = "0.7.1"

description = "Native desktop GUI framework for Gleam, powered by Iced"
licences = ["MIT"]
repository = { type = "github", user = "plushie-ui", repo = "plushie-gleam" }

[documentation]
pages = [
  { title = "Getting Started", path = "getting-started.html", source = "./docs/guides/02-getting-started.md" },
  { title = "Your First App", path = "your-first-app.html", source = "./docs/guides/03-your-first-app.md" },
  { title = "The Development Loop", path = "development-loop.html", source = "./docs/guides/04-the-development-loop.md" },
  { title = "Events", path = "events.html", source = "./docs/guides/05-events.md" },
  { title = "Layout", path = "layout.html", source = "./docs/guides/07-layout.md" },
  { title = "Styling", path = "styling.html", source = "./docs/guides/08-styling.md" },
  { title = "Subscriptions", path = "subscriptions.html", source = "./docs/guides/10-subscriptions.md" },
  { title = "Async and Effects", path = "async-and-effects.html", source = "./docs/guides/11-async-and-effects.md" },
  { title = "Canvas", path = "canvas.html", source = "./docs/guides/12-canvas.md" },
  { title = "Custom Widgets", path = "custom-widgets.html", source = "./docs/guides/13-custom-widgets.md" },
  { title = "Testing", path = "testing.html", source = "./docs/guides/15-testing.md" },
  { title = "Shared State", path = "shared-state.html", source = "./docs/guides/16-shared-state.md" },
  { title = "App Lifecycle", path = "app-lifecycle.html", source = "./docs/reference/app-lifecycle.md" },
  { title = "Configuration", path = "configuration.html", source = "./docs/reference/configuration.md" },
  { title = "Packaging and Distribution", path = "packaging-and-distribution.html", source = "./docs/reference/packaging-and-distribution.md" },
  { title = "Wire Protocol", path = "wire-protocol.html", source = "./docs/reference/wire-protocol.md" },
]

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_erlang = ">= 0.29.0 and < 2.0.0"
gleam_otp = ">= 0.14.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
glepack = ">= 0.1.0 and < 1.0.0"
telemetry = ">= 1.0.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
qcheck = ">= 1.0.4 and < 2.0.0"
file_system = ">= 1.0.0 and < 2.0.0"
