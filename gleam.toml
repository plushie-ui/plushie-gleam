name = "plushie_gleam"
version = "0.5.0"
binary_version = "0.5.1"

description = "Native desktop GUI framework for Gleam, powered by Iced"
licences = ["MIT"]
repository = { type = "github", user = "plushie-ui", repo = "plushie-gleam" }

[documentation]
pages = [
  { title = "Getting Started", path = "getting-started.html", source = "./docs/getting-started.md" },
  { title = "Tutorial", path = "tutorial.html", source = "./docs/tutorial.md" },
  { title = "App & Callbacks", path = "app-behaviour.html", source = "./docs/app-behaviour.md" },
  { title = "Layout", path = "layout.html", source = "./docs/layout.md" },
  { title = "Events", path = "events.html", source = "./docs/events.md" },
  { title = "Commands & Subscriptions", path = "commands.html", source = "./docs/commands.md" },
  { title = "Effects", path = "effects.html", source = "./docs/effects.md" },
  { title = "Theming", path = "theming.html", source = "./docs/theming.md" },
  { title = "Composition Patterns", path = "composition-patterns.html", source = "./docs/composition-patterns.md" },
  { title = "Scoped IDs", path = "scoped-ids.html", source = "./docs/scoped-ids.md" },
  { title = "Testing", path = "testing.html", source = "./docs/testing.md" },
  { title = "Accessibility", path = "accessibility.html", source = "./docs/accessibility.md" },
  { title = "Extensions", path = "extensions.html", source = "./docs/extensions.md" },
  { title = "Running & Deployment", path = "running.html", source = "./docs/running.md" },
]

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_erlang = ">= 0.29.0 and < 2.0.0"
gleam_otp = ">= 0.14.0 and < 2.0.0"
gleam_json = ">= 3.1.0 and < 4.0.0"
glepack = ">= 0.1.0 and < 1.0.0"
telemetry = ">= 1.0.0 and < 2.0.0"
file_system = ">= 1.0.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
